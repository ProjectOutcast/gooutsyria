# Local development: run `docker compose up -d db`, then `npm run dev`.
# Full production-like test: `docker compose up --build`.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gooutsyria
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    profiles: ["full"]
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/gooutsyria
      AUTH_SECRET: local-dev-secret-change-me
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      UPLOAD_DIR: /data/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads:/data/uploads

volumes:
  pgdata:
  uploads:
